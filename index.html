<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dollar Token (DLT)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#0d1117;
    color:white;
}

header{
    padding:80px 20px;
    text-align:center;
}

header h1{
    font-size:56px;
}

header p{
    margin-top:15px;
    color:#b7c0cd;
    font-size:20px;
}

.button{
    display:inline-block;
    margin-top:35px;
    padding:15px 35px;
    background:#16c784;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

section{
    max-width:900px;
    margin:auto;
    padding:50px 20px;
}

.card{
    background:#161b22;
    padding:25px;
    border-radius:15px;
}

.card h2{
    margin-bottom:20px;
}

.card p{
    margin:12px 0;
}

.contract{
    color:#16c784;
    word-break:break-all;
}
</style>

</head>

<body>

<header>

<h1>Dollar Token</h1>

<p>A community token built on BNB Smart Chain.</p>

<a class="button" href="#">
Buy on PancakeSwap
</a>

</header>

<section>

<div class="card">

<h2>Token Information</h2>

<p><strong>Name:</strong> Dollar Token</p>

<p><strong>Symbol:</strong> DLT</p>

<p><strong>Total Supply:</strong> 10,000,000,000 DLT</p>

<p><strong>Network:</strong> BNB Smart Chain</p>

<p class="contract">
0xE61a997612314479c12e97738a6fE14718873F17
</p>

</div>

</section>

</body>
</html>
